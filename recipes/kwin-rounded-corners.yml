---
# yaml-language-server: $schema=https://schema.blue-build.org/module-v1.json
type: containerfile
snippets:
  - |
    RUN set -euo pipefail && \
        dnf install -y \
            cmake \
            extra-cmake-modules \
            kwin-devel \
            kf6-kconfigwidgets-devel \
            kf6-kwindowsystem-devel \
            kf6-ki18n-devel \
            qt6-qtbase-devel \
            libepoxy-devel \
            git \
        && \
        git clone --depth=1 https://github.com/matinlotfali/KDE-Rounded-Corners /tmp/krc && \
        cmake -S /tmp/krc -B /tmp/krc/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
        && \
        cmake --build /tmp/krc/build -j$(nproc) && \
        cmake --install /tmp/krc/build && \
        rm -rf /tmp/krc && \
        dnf remove -y --no-dependencies \
            cmake \
            extra-cmake-modules \
            kwin-devel \
            kf6-kconfigwidgets-devel \
            kf6-kwindowsystem-devel \
            kf6-ki18n-devel \
            qt6-qtbase-devel \
            libepoxy-devel \
            git \
        && \
        dnf clean all && \
        rm -rf /var/cache/dnf
