---
# yaml-language-server: $schema=https://schema.blue-build.org/module-v1.json
type: containerfile
snippets:
  - |
    # Build and install VMware DKMS kernel modules
    RUN set -euo pipefail && \
        VMWARE_VER="26H1" && \
        VMWARE_BUILD="25388281" && \
        BUNDLE="VMware-Workstation-Full-${VMWARE_VER}-${VMWARE_BUILD}.x86_64.bundle" && \
        BUNDLE_URL="https://archive.org/download/VMware-Workstation-Full-${VMWARE_VER}-${VMWARE_BUILD}.x86_64/${BUNDLE}" && \
        DKMS_DIR="/usr/src/vmware-workstation-${VMWARE_VER}_${VMWARE_BUILD}" && \
        SRC_DIR="/usr/src/vmware-workstation" && \
        mkdir -p "$DKMS_DIR" /tmp/vmware-dkms && \
        cd /tmp/vmware-dkms && \
        echo "Downloading VMware bundle for DKMS modules..." && \
        curl -fL -o "$BUNDLE" "$BUNDLE_URL" && \
        chmod +x "$BUNDLE" && \
        echo "Extracting VMware kernel module sources..." && \
        ./"$BUNDLE" --extract extracted && \
        echo "Setting up DKMS configuration..." && \
        sed \
          -e "s/@PKGNAME@/vmware-workstation/g" \
          -e "s/@PKGVER@/${VMWARE_VER}_${VMWARE_BUILD}/g" \
          "$SRC_DIR/dkms.conf.in" > "$DKMS_DIR/dkms.conf" && \
        install -Dm 644 "$SRC_DIR/Makefile" "$DKMS_DIR/Makefile" && \
        for module in vmmon vmnet; do \
          echo "Extracting $module module..." && \
          tar -xf "extracted/vmware-vmx/lib/modules/source/$module.tar" -C "$DKMS_DIR" && \
          echo "Applying patch to $module..." && \
          patch -p2 --read-only=ignore --directory="$DKMS_DIR/$module-only" < "$SRC_DIR/$module.patch" ; \
        done && \
        echo "Registering DKMS modules..." && \
        dkms add -m vmware-workstation -v "${VMWARE_VER}_${VMWARE_BUILD}" && \
        KVER=$(rpm -q --qf '%{VERSION}-%{RELEASE}.%{ARCH}' kernel-core) && \
        echo "Building DKMS modules for kernel $KVER..." && \
        dkms build -m vmware-workstation -v "${VMWARE_VER}_${VMWARE_BUILD}" -k "${KVER}" && \
        echo "Installing DKMS modules..." && \
        dkms install -m vmware-workstation -v "${VMWARE_VER}_${VMWARE_BUILD}" -k "${KVER}" && \
        echo "Cleaning up..." && \
        rm -rf /tmp/vmware-dkms && \
        echo "DKMS modules installation complete"
