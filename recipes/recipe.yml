---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: akaremii-os
# description will be included in the image's metadata
description: This is my personal OS image.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/bazzite-dx-nvidia
image-version: latest # latest is also supported if you want new updates ASAP

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  - type: dnf
    repos:
      copr:
        - atim/starship
        - matinlotfali/KDE-Rounded-Corners
        - scujas/plasma-applet-appgrid
    install:
      packages:
        - micro
        - starship
        - cava
        - kwin-effect-roundcorners
        - plasma-applet-appgrid
        - python-websockets
        - qt6-qtwebsockets-devel
        - https://github.com/samuelngs/apple-emoji-ttf/releases/download/macos-26-20260613-f1fc560b/fonts-apple-color-emoji.rpm

    remove:
      packages:
        - firefox
        - firefox-langpacks

  - type: os-release
    properties:
      NAME: "Akaremii OS"
      ID: "akaremii-os"
      ID_LIKE: "fedora"
      PRETTY_NAME: "Akaremii OS"
      HOME_URL: "https://github.com/akaremii26/akaremii-os"
      DOCUMENTATION_URL: "https://github.com/akaremii26/akaremii-os"
      SUPPORT_URL: "https://github.com/akaremii26/akaremii-os"
      BUG_REPORT_URL: "https://github.com/akaremii26/akaremii-os/issues/"

  # VMware Workstation host kernel modules (vmmon/vmnet)
  - type: containerfile
    snippets:
      - |
        RUN set -euo pipefail && \
            VMWARE_VER="26H1" && \
            VMWARE_BUILD="25388281" && \
            BUNDLE="VMware-Workstation-Full-${VMWARE_VER}-${VMWARE_BUILD}.x86_64.bundle" && \
            BUNDLE_URL="https://archive.org/download/VMware-Workstation-Full-${VMWARE_VER}-${VMWARE_BUILD}.x86_64/${BUNDLE}" && \
            KVER=$(rpm -q --qf '%{VERSION}-%{RELEASE}.%{ARCH}' kernel-core) && \
            dnf install -y kernel-devel-${KVER} kernel-headers-${KVER} gcc make patch elfutils-libelf-devel && \
            mkdir -p /tmp/vmw && cd /tmp/vmw && \
            curl -fL -o "$BUNDLE" "$BUNDLE_URL" && \
            chmod +x "$BUNDLE" && \
            ./"$BUNDLE" --extract extracted && \
            tar -xf extracted/vmware-vmx/lib/modules/source/vmmon.tar && \
            tar -xf extracted/vmware-vmx/lib/modules/source/vmnet.tar && \
            sed -i 's/^VM_UNAME = $(shell uname -r)$/ifdef KVERSION\n VM_UNAME = $(KVERSION)\nelse\n VM_UNAME = $(shell uname -r)\nendif/' vmmon-only/Makefile && \
            sed -i 's/^VM_UNAME = $(shell uname -r)$/ifdef KVERSION\n VM_UNAME = $(KVERSION)\nelse\n VM_UNAME = $(shell uname -r)\nendif/' vmnet-only/Makefile && \
            make -C vmmon-only KVERSION=${KVER} VM_KBUILD=yes && \
            make -C vmnet-only KVERSION=${KVER} VM_KBUILD=yes && \
            install -Dm644 vmmon-only/vmmon.ko /usr/lib/modules/${KVER}/extra/vmware/vmmon.ko && \
            install -Dm644 vmnet-only/vmnet.ko /usr/lib/modules/${KVER}/extra/vmware/vmnet.ko && \
            depmod -a ${KVER} && \
            echo -e "vmw_vmci\nvmmon" > /usr/lib/modules-load.d/vmware.conf && \
            cd / && rm -rf /tmp/vmw && \
            dnf remove -y kernel-devel-${KVER} kernel-headers-${KVER}

  - type: signing # this sets up the proper policy & signing files for signed images to work fully
